server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/msq/wholesale-config-repo
          default-label: main
          search-paths: '{application}'
          clone-on-start: true
        default-label: main
  security:
    user:
      name: configadmin
      password: configpassword

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh