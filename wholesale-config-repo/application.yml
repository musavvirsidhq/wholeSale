spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wholesale_db
    username: postgres
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

jwt:
  secret: ${JWT_SECRET:yourSecretKeyForJWTTokenGenerationWithSufficientLength}
  expiration: 86400000

logging:
  level:
    com.wholesale: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO